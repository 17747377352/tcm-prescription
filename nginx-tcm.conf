# TCM Prescription routes appended into existing server block

    # ============ 中药智能抓配平台 - 患者端 ============
    location /tcm/ {
        alias /home/ubuntu/deploy/tcm-patient/;
        index index.html;
        try_files $uri $uri/ /tcm/index.html;
    }

    # ============ 中药智能抓配平台 - 管理端 ============
    location /tcm-admin/ {
        alias /home/ubuntu/deploy/tcm-admin/;
        index index.html;
        try_files $uri $uri/ /tcm-admin/index.html;
    }

    # ============ 中药智能抓配平台 API ============
    location /tcm-api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
